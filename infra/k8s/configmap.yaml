apiVersion: v1
kind: ConfigMap
metadata:
  name: superapp-config
  namespace: superapp
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "superapp"
  REDIS_URL: "redis://redis:6379"
  KAFKA_BROKERS: "kafka:9092"
  AUTH_SERVICE_URL: "http://auth-service:8001"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service:8002"
  MARKETPLACE_SERVICE_URL: "http://marketplace-service:8003"
  ADVISORY_SERVICE_URL: "http://advisory-service:8004"
  NODE_ENV: "production"
