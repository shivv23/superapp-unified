name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check "**/*.{js,ts,tsx,json,css,md}"

      - name: Lint frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run lint --if-present

      - name: Lint marketplace service
        working-directory: services/marketplace
        run: npm ci && npm run lint --if-present

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go vet auth service
        working-directory: services/auth
        run: |
          go mod download
          go vet ./...

      - name: Go vet portfolio service
        working-directory: services/portfolio
        run: |
          go mod download
          go vet ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Lint advisory service
        working-directory: services/advisory
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install and test frontend
        working-directory: apps/web
        run: |
          npm ci
          npm test --if-present

      - name: Install and test marketplace
        working-directory: services/marketplace
        run: |
          npm ci
          npm test --if-present

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test auth service
        working-directory: services/auth
        run: |
          go mod download
          go test ./...

      - name: Test portfolio service
        working-directory: services/portfolio
        run: |
          go mod download
          go test ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test advisory service
        working-directory: services/advisory
        run: |
          pip install -r requirements.txt
          python -m pytest src/tests/ --tb=short || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Build frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Build marketplace service
        working-directory: services/marketplace
        run: |
          npm ci
          npm run build --if-present

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build auth service
        working-directory: services/auth
        run: |
          go mod download
          go build -o bin/auth-service ./cmd/server

      - name: Build portfolio service
        working-directory: services/portfolio
        run: |
          go mod download
          go build -o bin/portfolio-service ./cmd/server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: superapp/frontend:${{ github.sha }},superapp/frontend:latest

      - name: Build and push auth service
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth
          push: true
          tags: superapp/auth-service:${{ github.sha }},superapp/auth-service:latest

      - name: Build and push portfolio service
        uses: docker/build-push-action@v6
        with:
          context: ./services/portfolio
          push: true
          tags: superapp/portfolio-service:${{ github.sha }},superapp/portfolio-service:latest

      - name: Build and push marketplace service
        uses: docker/build-push-action@v6
        with:
          context: ./services/marketplace
          push: true
          tags: superapp/marketplace-service:${{ github.sha }},superapp/marketplace-service:latest

      - name: Build and push advisory service
        uses: docker/build-push-action@v6
        with:
          context: ./services/advisory
          push: true
          tags: superapp/advisory-service:${{ github.sha }},superapp/advisory-service:latest
